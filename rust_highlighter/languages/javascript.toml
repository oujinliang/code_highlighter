name = "javascript"
extensions = [".js", ".jsx", ".mjs", ".cjs"]
delimiters = [" ", "\t", "(", ")", "{", "}", "[", "]", ";", ",", ".", "<", ">", "+", "-", "*", "/", "%", "&", "|", "^", "!", "~", "=", "?", ":", "@"]
back_delimiters = []
ignore_case = false

[[keywords]]
name = "keyword"
keywords = [
    "break", "case", "catch", "continue", "debugger", "default", "delete", "do",
    "else", "finally", "for", "function", "if", "in", "instanceof", "new", "return",
    "switch", "this", "throw", "try", "typeof", "var", "void", "while", "with",
    "class", "const", "enum", "export", "extends", "import", "super", "implements",
    "interface", "let", "package", "private", "protected", "public", "static", "yield",
    "async", "await", "of"
]

[[keywords]]
name = "literal"
keywords = [
    "true", "false", "null", "undefined", "NaN", "Infinity"
]

[[keywords]]
name = "builtin"
keywords = [
    "console", "window", "document", "Math", "JSON", "Date", "Array", "Object",
    "String", "Number", "Boolean", "RegExp", "Error", "Map", "Set", "WeakMap",
    "WeakSet", "Promise", "Symbol", "Proxy", "Reflect", "Intl", "ArrayBuffer",
    "DataView", "Int8Array", "Int16Array", "Int32Array", "Uint8Array",
    "Uint16Array", "Uint32Array", "Float32Array", "Float64Array"
]

[[single_line_blocks]]
name = "comment"
start = "//"
end = ""

[[single_line_blocks]]
name = "string"
start = "\""
end = "\""
escape = { escape_string = "\\", items = ["\\\"", "\\\\"] }

[[single_line_blocks]]
name = "string"
start = "'"
end = "'"
escape = { escape_string = "\\", items = ["\\'", "\\\\"] }

[[single_line_blocks]]
name = "template literal"
start = "`"
end = "`"
escape = { escape_string = "\\", items = ["\\`", "\\\\"] }

[[multi_line_blocks]]
name = "multi-line comment"
start = "/*"
end = "*/"

[[tokens]]
name = "number"
pattern = "\\b\\d+\\.?\\d*([eE][+-]?\\d+)?\\b"

[[tokens]]
name = "hex number"
pattern = "\\b0[xX][0-9a-fA-F]+\\b"

[[tokens]]
name = "octal number"
pattern = "\\b0[oO][0-7]+\\b"

[[tokens]]
name = "binary number"
pattern = "\\b0[bB][01]+\\b"

[[tokens]]
name = "regex"
pattern = "/[^/\\n]+/[gimsuy]*"

[[tokens]]
name = "arrow function"
pattern = "=>"

[[tokens]]
name = "spread operator"
pattern = "\\.\\.\\."

[[tokens]]
name = "optional chaining"
pattern = "\\?\\."

[[tokens]]
name = "nullish coalescing"
pattern = "\\?\\?"