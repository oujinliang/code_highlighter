name = "scala"
extensions = [".scala"]
delimiters = [" ", "\t", "(", ")", "{", "}", "[", "]", ";", ",", ".", "<", ">", "+", "-", "*", "/", "%", "&", "|", "^", "!", "~", "=", "?", ":", "@"]
back_delimiters = []
ignore_case = false

[[keywords]]
name = "keyword"
keywords = [
    "abstract", "case", "catch", "class", "def",
    "do", "else", "extends", "false", "final",
    "finally", "for", "forSome", "if", "implicit",
    "import", "lazy", "match", "new", "null",
    "object", "override", "package", "private", "protected",
    "return", "sealed", "super", "this", "throw",
    "trait", "true", "try", "type", "val",
    "var", "while", "with", "yield",
    "macro", "then", "enum", "given", "using"
]

[[keywords]]
name = "type"
keywords = [
    "Boolean", "Byte", "Char", "Double", "Float",
    "Int", "Long", "Short", "String", "Unit",
    "Any", "AnyRef", "AnyVal", "Nothing", "Null",
    "Option", "Some", "None", "List", "Map",
    "Set", "Array", "Seq", "Vector", "Tuple",
    "Either", "Left", "Right", "Try", "Success",
    "Failure", "Future", "Promise"
]

[[keywords]]
name = "builtin"
keywords = [
    "println", "print", "readLine", "readInt", "readDouble",
    "require", "assert", "assume", "ensuring", "??",
    "implicitly", "identity", "locally", "synchronized",
    "wait", "notify", "notifyAll", "toString", "hashCode",
    "equals", "getClass", "asInstanceOf", "isInstanceOf"
]

[[single_line_blocks]]
name = "comment"
start = "//"
end = ""

[[single_line_blocks]]
name = "string"
start = "\""
end = "\""
escape = { escape_string = "\\", items = ["\\\"", "\\\\"] }

[[single_line_blocks]]
name = "char"
start = "'"
end = "'"
escape = { escape_string = "\\", items = ["\\'", "\\\\"] }

[[multi_line_blocks]]
name = "multi-line comment"
start = "/*"
end = "*/"

[[multi_line_blocks]]
name = "scaladoc"
start = "/**"
end = "*/"

[[multi_line_blocks]]
name = "string"
start = "\"\"\""
end = "\"\"\""

[[tokens]]
name = "number"
pattern = "\\b\\d+\\.?\\d*([eE][+-]?\\d+)?[fFdDlL]?\\b"

[[tokens]]
name = "hex number"
pattern = "\\b0[xX][0-9a-fA-F]+[lL]?\\b"

[[tokens]]
name = "binary number"
pattern = "\\b0[bB][01]+[lL]?\\b"

[[tokens]]
name = "annotation"
pattern = "@\\w+"

[[tokens]]
name = "symbol"
pattern = "'\\w+"

[[tokens]]
name = "interpolation"
pattern = "\\$\\w+"

[[tokens]]
name = "interpolation block"
pattern = "\\$\\{[^}]+\\}"